    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#FF6A2A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Vibe Alarm</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='32' fill='%23FF6A2A'/><g fill='none' stroke='%23000' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><circle cx='32' cy='33' r='13'/><line x1='32' y1='26' x2='32' y2='33'/><line x1='32' y1='33' x2='38' y2='37'/><line x1='22' y1='16' x2='18' y2='12'/><line x1='42' y1='16' x2='46' y2='12'/><line x1='22' y1='47' x2='42' y2='47'/></g></svg>"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%23FF6A2A'/><g fill='none' stroke='%23000' stroke-width='8' stroke-linecap='round' stroke-linejoin='round'><circle cx='90' cy='95' r='38'/><line x1='90' y1='74' x2='90' y2='95'/><line x1='90' y1='95' x2='107' y2='106'/><line x1='62' y1='46' x2='50' y2='34'/><line x1='118' y1='46' x2='130' y2='34'/><line x1='62' y1='135' x2='118' y2='135'/></g></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ── */
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{width:100%;height:100%;overflow:hidden}
    body{
      width:100%;height:100%;
      overflow:hidden;
      background:#0A0B0D;
      color:#F4F5F7;
      font-family:'Inter',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      display:flex;align-items:stretch;justify-content:center;
      /* Top inset only — bottom safe-area handled per-screen (fixed CTAs, .safe-bottom) */
      padding:env(safe-area-inset-top,0px) 0 0 0;
    }
    :root{
      /* Fallback 16px when env() unsupported (older WebViews) */
      --safe-bottom:env(safe-area-inset-bottom,16px);
      --canvas:#0A0B0D;
      --surface:rgba(18,18,22,.72);
      --ink:#F4F5F7;
      --muted:#A4A7AE;
      --line:rgba(255,255,255,.07);
      --accent:#FF6A2A;
      /* fluid font scale — slightly larger mins for phones / WebView */
      --fs-xl:clamp(64px,17vw,96px);
      --fs-lg:clamp(19px,5.2vw,24px);
      --fs-md:clamp(14px,3.8vw,17px);
      --fs-sm:clamp(11px,3vw,14px);
      --fs-xs:clamp(10px,2.6vw,12px);
      --px:clamp(18px,5vw,28px);
      --gap:clamp(10px,2.8vw,14px);
      /* wheel row height — JS reads offsetHeight for scroll math */
      --wheel-item-h:clamp(58px,15vw,72px);
    }
    ::-webkit-scrollbar{display:none}
    *{scrollbar-width:none}

    /* ── SHELL ── */
    .sf{font-family:'Playfair Display',Georgia,serif}
    .shell{
      position:relative;
      width:100%;
      max-width:min(520px,100%);
      /* fill entire viewport height including safe areas */
      height:100dvh;
      min-height:100vh; /* fallback */
      overflow:hidden;
      background:var(--canvas);
      display:flex;
      flex-direction:column;
    }

    /* ── SCREENS ── */
    /* No transform here — fixed .bottom-cta / .bottom-button would track the transformed ancestor and “bounce” on enter */
    .screen{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      opacity:0;pointer-events:none;z-index:0;
      transition:opacity .22s ease;
      padding-bottom:var(--safe-bottom);
    }
    .screen.active{opacity:1;pointer-events:auto;z-index:10}

    /* ── PILL BUTTON ── */
    .pill-btn{
      height:clamp(42px,11vw,48px);width:clamp(42px,11vw,48px);
      flex-shrink:0;
      display:grid;place-items:center;
      border-radius:50%;
      background:var(--surface);
      backdrop-filter:blur(14px);
      border:1px solid var(--line);
      color:var(--ink);cursor:pointer;
      transition:transform .1s;
      -webkit-backdrop-filter:blur(14px);
    }
    .pill-btn:active{transform:scale(.88)}

    /* ── GLASS ── */
    .glass{
      border-radius:16px;
      background:var(--surface);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--line);
    }

    /* ── ACCENT BUTTON ── */
    .accent-btn{
      width:100%;
      padding:clamp(14px,4vw,18px);
      border:none;border-radius:999px;
      background:linear-gradient(135deg,rgba(255,140,90,.95),rgba(255,85,0,.95));
      box-shadow:0 14px 32px rgba(255,106,42,.38),inset 0 1px 0 rgba(255,255,255,.22);
      color:#fff;font-size:var(--fs-md);font-weight:600;
      cursor:pointer;transition:transform .1s;letter-spacing:.01em;
    }
    .accent-btn:active{transform:scale(.97)}

    /* ── GHOST BUTTON ── */
    .ghost-btn{
      padding:clamp(15px,4.2vw,20px) clamp(36px,11vw,56px);
      border:1px solid rgba(255,255,255,.1);border-radius:999px;
      background:rgba(14,14,18,.7);backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      color:rgba(255,255,255,.92);font-size:15px;font-weight:400;
      cursor:pointer;transition:transform .1s;letter-spacing:.04em;
    }
    .ghost-btn:active{transform:scale(.97)}

    /* ── TOGGLE ── */
    .toggle{
      position:relative;flex-shrink:0;
      width:48px;height:28px;border-radius:14px;
      cursor:pointer;border:none;transition:background .25s;
    }
    .toggle .knob{
      position:absolute;top:50%;
      width:20px;height:20px;border-radius:10px;
      background:radial-gradient(100% 100% at 50% 30%,#fff 0%,#EDEEEF 40%,#C8CBD1 100%);
      transition:transform .28s cubic-bezier(.34,1.56,.64,1);
    }
    .toggle.off{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
    .toggle.off .knob{transform:translateY(-50%) translateX(4px)}
    .toggle.on{background:linear-gradient(135deg,rgba(255,140,90,.6),rgba(255,106,42,.5));border:1px solid rgba(255,106,42,.35)}
    .toggle.on .knob{transform:translateY(-50%) translateX(24px);box-shadow:0 0 12px rgba(255,106,42,.3)}

    svg.icon{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

    /* ── ANIMATIONS ── */
    @keyframes pulse-glow{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
    @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.18);opacity:1}}
    @keyframes ambient{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.14);opacity:.6}}
    @keyframes waveAnim{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}
    @keyframes ringOut{0%{width:60px;height:60px;opacity:0}20%{opacity:.5}100%{width:200vw;height:200vw;opacity:0}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes ringPulse{0%,100%{box-shadow:0 0 40px rgba(255,106,42,.5),0 0 80px rgba(255,106,42,.3)}50%{box-shadow:0 0 60px rgba(255,106,42,.8),0 0 120px rgba(255,106,42,.5)}}
    .anim{opacity:0;animation:slideUp .45s cubic-bezier(.16,1,.3,1) forwards}

    /* ── WHEEL ── */
    .w-wrap{
      position:relative;border-radius:20px;
      background:rgba(10,10,14,.92);
      border:1px solid var(--line);overflow:hidden;
    }
    .wheel{
      height:calc(var(--wheel-item-h) * 3);
      overflow:hidden;
      position:relative;
    }
    .wheel-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      height:100%;
      overflow-y:auto;
      /* mandatory snap fights touch momentum + JS scrollTop → visible jitter */
      scroll-snap-type:none;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
      overscroll-behavior:contain;
    }
    .wheel-inner::-webkit-scrollbar{display:none}
    .wheel-inner.wheel-syncing{
      pointer-events:none;
    }
    .wheel-pad{
      height:var(--wheel-item-h);
      flex-shrink:0;
      pointer-events:none;
    }
    .w-item{
      flex-shrink:0;
      height:var(--wheel-item-h);
      min-height:var(--wheel-item-h);
      display:flex;
      align-items:center;
      justify-content:center;
      scroll-snap-align:none;
      font-family:'Playfair Display',Georgia,serif;
      font-variant-numeric:tabular-nums;
      font-size:clamp(30px,9vw,46px);
      font-weight:500;
      color:#fff;
      opacity:0.22;
      transition:none;
      -webkit-font-smoothing:antialiased;
    }
    .w-item.active{
      opacity:1;
    }
    textarea#note-inp{
      max-height:80px;
      overflow-y:auto;
      caret-color:#fff;
    }
    textarea#note-inp::placeholder{
      opacity:0.6;
    }
    .dismiss-slider{
      position:relative;
      bottom:auto;
    }
    .alarm-actions{
      position:absolute;
      bottom:calc(var(--safe-bottom) + 90px);
      left:0;
      right:0;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      z-index:20;
      pointer-events:auto;
      box-sizing:border-box;
      padding:0 var(--px);
    }

    /* ── SLIDE DISMISS ── */
    .slide-track{
      position:relative;display:flex;align-items:center;
      width:min(280px,80vw);height:64px;
      background:rgba(6,6,10,.6);border-radius:99px;
      border:1px solid rgba(255,255,255,.09);
      box-shadow:inset 0 2px 12px rgba(0,0,0,.55);
    }
    .slide-handle{
      position:absolute;left:6px;top:50%;transform:translateY(-50%);
      height:52px;width:52px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 32% 32%,#ff8a60,#FF5520);
      box-shadow:0 0 22px rgba(255,90,30,.55),inset 0 2px 5px rgba(255,255,255,.28);
      cursor:grab;z-index:10;touch-action:none;
    }
    .slide-handle:active{cursor:grabbing}
    .slide-txt{
      position:absolute;width:100%;text-align:center;
      font-size:13px;font-weight:300;
      color:rgba(255,255,255,.3);letter-spacing:.08em;pointer-events:none;
    }

    /* ── DAY CHIP ── */
    .day-btn{
      height:clamp(36px,10vw,42px);flex:1;
      border-radius:10px;font-size:clamp(10px,2.8vw,12px);font-weight:600;
      border:none;cursor:pointer;transition:all .18s;
      -webkit-tap-highlight-color:transparent;
    }
    .day-btn.on{background:linear-gradient(135deg,rgba(255,140,90,.55),rgba(255,106,42,.65));border:1px solid rgba(255,255,255,.12);color:#fff;box-shadow:0 4px 12px rgba(255,106,42,.22)}
    .day-btn.off{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--muted)}

    /* ── WAVE BAR ── */
    @keyframes wave{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
    .wave-bar{width:3px;border-radius:2px;background:var(--accent);transform-origin:bottom;animation:wave .6s ease-in-out infinite alternate}

    /* ── RANGE INPUT ── */
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#C8CBD1);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}

    /* Universal bottom breathing room (dashboard, onboarding, configuration, alarm flows, ringing) */
    .safe-bottom{
      padding-bottom:calc(var(--safe-bottom) + 32px);
    }
    /* Onboarding: scrollable copy; reserve space so text never sits under fixed CTA */
    .page{
      flex:1;
      min-height:0;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      padding-left:var(--px);
      padding-right:var(--px);
      padding-bottom:calc(var(--safe-bottom) + 100px);
    }
    .welcome-wrap{
      display:flex;
      flex-direction:column;
      height:100%;
      min-height:0;
      position:relative;
    }
    .hero-text{
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
      margin-top:40px;
      flex:1;
      min-height:0;
      position:relative;
      z-index:2;
    }
    .hero-text h1{
      margin-top:clamp(40px,10vh,120px);
    }
    /* Fixed primary actions — always above gesture / nav bar */
    .bottom-cta,
    .bottom-button{
      position:fixed;
      bottom:calc(var(--safe-bottom) + 16px);
      left:16px;
      right:16px;
      z-index:50;
      max-width:min(520px,calc(100% - 32px));
      margin-left:auto;
      margin-right:auto;
      pointer-events:auto;
    }
    /* Fixed save on add/edit alarm — above gesture / nav bar */
    .save-btn{
      position:fixed;
      bottom:calc(var(--safe-bottom) + 24px);
      left:16px;
      right:16px;
      z-index:40;
      max-width:min(520px,calc(100% - 32px));
      margin-left:auto;
      margin-right:auto;
      box-sizing:border-box;
    }
    /* ── SCROLL AREA ── */
    .scroll-area{
      flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
      padding-bottom:calc(var(--safe-bottom) + 32px);
    }
    .scroll-area.alarm-edit-scroll{
      padding-bottom:calc(var(--safe-bottom) + 104px);
    }
    .perms-scroll-area{
      padding-bottom:calc(var(--safe-bottom) + 80px);
    }
    .bottom-spacer{
      height:calc(var(--safe-bottom) + 20px);
      flex-shrink:0;
      pointer-events:none;
    }

    /* Dashboard clock — large center time */
    #dash-time{
      font-size:clamp(80px,20vw,120px);
      line-height:1.02;
      font-weight:300;
      letter-spacing:-0.03em;
      color:#FAFAFB;
      text-shadow:0 12px 36px rgba(0,0,0,.8),0 0 60px rgba(255,106,42,.14);
      min-height:1.1em;
      -webkit-font-smoothing:antialiased;
    }

    /* ── BG LAYER (per-screen gradient via inline style) ── */
    .bg-gradient{
      position:absolute;
      left:0;right:0;top:0;
      bottom:calc(-1 * var(--safe-bottom));
      min-height:100%;
      height:calc(100% + var(--safe-bottom) + 32px);
      pointer-events:none;
      z-index:0;
      background:radial-gradient(ellipse 120% 50% at 50% -10%,
        rgba(255,135,64,.95) 0%,
        rgba(255,96,32,.75) 20%,
        rgba(255,96,32,.18) 45%,
        transparent 65%
      );
    }
    .glass,.page-hdr,.scroll-area{position:relative;z-index:2}

    /* ── HEADER (reusable) ── */
    .page-hdr{
      padding:20px var(--px) 16px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
    }
  </style>
</head>
<body>
<div class="shell" id="app"></div>
<script>
  "use strict";

  /* ── STATE ── */
  var S={
    screen:'dashboard',prevScreen:'dashboard',
    alarms:[],history:[],
    editAlarm:null,
    wheelHour:7,wheelMinute:0,wheelPeriod:'AM',
    ringingAlarmId:null,snoozeCount:0,
    permissions:{notifications:false},
    settings:{snoozeDuration:9,fadeInDuration:30,vibPattern:'Pulse',bedtime:true,permissionsGranted:false},
    onboarded:false
  };
  try{
    var _sv=localStorage.getItem('vibe4');
    if(_sv){var _p=JSON.parse(_sv);S.alarms=_p.alarms||[];S.history=_p.history||[];S.settings=Object.assign(S.settings,_p.settings||{});S.onboarded=!!_p.onboarded;if(_p.permissions)S.permissions=Object.assign(S.permissions,_p.permissions||{});}
  }catch(e){}
  try{
    if(typeof Android!=='undefined'&&Android.getPersistedPayload){
      var _pj=Android.getPersistedPayload();
      if(_pj){
        var _n=JSON.parse(_pj);
        if(_n.alarms)S.alarms=_n.alarms;
        if(_n.history)S.history=_n.history;
        if(_n.settings)S.settings=Object.assign(S.settings,_n.settings||{});
        if(typeof _n.onboarded==='boolean')S.onboarded=_n.onboarded;
        if(_n.permissions)S.permissions=Object.assign(S.permissions||{},_n.permissions||{});
      }
    }
  }catch(e){}
  S.settings.snoozeDuration=Math.min(Math.max(1,S.settings.snoozeDuration||9),10);
  var VALID_BUILT_IN_SOUNDS=['Soft Bells','Digital Beep','Acoustic Strum','Pulse Tone','Morning Piano'];
  function migrateAlarmSounds(){
    S.alarms.forEach(function(a){
      if(!a||!a.sound)return;
      var s=String(a.sound);
      if(s.indexOf('blob:')===0||s.indexOf('http')===0)a.sound='Soft Bells';
      else if(VALID_BUILT_IN_SOUNDS.indexOf(a.sound)===-1)a.sound='Soft Bells';
    });
  }
  migrateAlarmSounds();
  function saveState(){try{localStorage.setItem('vibe4',JSON.stringify({alarms:S.alarms,history:S.history,settings:S.settings,onboarded:S.onboarded,permissions:S.permissions}));}catch(e){}}
  function androidNotify(){try{if(typeof Android!=='undefined'&&Android.onAlarmsChanged)Android.onAlarmsChanged(JSON.stringify({alarms:S.alarms,settings:S.settings,history:S.history,onboarded:S.onboarded,permissions:S.permissions}));}catch(e){}}
  var _androidNotifyTimer=null;
  function androidNotifyDebounced(){
    clearTimeout(_androidNotifyTimer);
    _androidNotifyTimer=setTimeout(function(){androidNotify();},380);
  }
  function stopNativeIfAny(){try{if(typeof Android!=='undefined'&&Android.stopAlarmSound)Android.stopAlarmSound();}catch(e){}}
  function showNativeAlarm(alarmId){S.ringingAlarmId=alarmId;S.snoozeCount=0;unlockAudio();go('ringing');}
  function syncFromNativeOnce(alarmId){var a=S.alarms.find(function(x){return x.id===alarmId});if(a&&a.scheduleType==='once')a.enabled=false;saveState();androidNotify();}
  setInterval(saveState,3000);
  setInterval(function(){
    var colon=document.querySelector('.colon');
    if(colon){
      colon.style.opacity=colon.style.opacity==='0'?'1':'0';
    }
  },1000);

  var SOUNDS=[
    {name:'Soft Bells',  cat:'Gentle',  desc:'Warm ascending bell tones'},
    {name:'Digital Beep',cat:'Classic', desc:'Standard digital beep'},
    {name:'Acoustic Strum',cat:'Musical',desc:'Gentle guitar chord'},
    {name:'Pulse Tone',  cat:'Minimal', desc:'Clean repeating pulse'},
    {name:'Morning Piano', cat:'Musical', desc:'Light arpeggio'},
  ];

  /* ── AUDIO CONTEXT ── */
  var ACX=null;
  function ac(){
    if(!ACX){ACX=new(window.AudioContext||window.webkitAudioContext)();}
    if(ACX.state==='suspended'){ACX.resume();}
    return ACX;
  }
  /* Force audio context unlock on first user interaction */
  function unlockAudio(){
    try{
      var ctx=ac();
      var buf=ctx.createBuffer(1,1,22050);
      var src=ctx.createBufferSource();
      src.buffer=buf;src.connect(ctx.destination);
      src.start(0);src.disconnect();
    }catch(e){}
  }
  document.addEventListener('click',unlockAudio,{once:true});
  document.addEventListener('touchend',unlockAudio,{once:true});

  var SYNTHS={
    'Soft Bells':function(){
      var ctx=ac(),master=ctx.createGain();master.gain.value=0.65;master.connect(ctx.destination);
      var dead=false,tid;
      var seq=[523,659,784,1047,880,659,784,1047,1319,1047,784,659];var si=0;
      function bell(freq,delay,dur){
        var o=ctx.createOscillator(),g=ctx.createGain(),o2=ctx.createOscillator(),g2=ctx.createGain();
        o.type='sine';o.frequency.value=freq;o2.type='sine';o2.frequency.value=freq*2;
        var t=ctx.currentTime+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.75,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.18,t+0.01);g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
        o.connect(g);g.connect(master);o2.connect(g2);g2.connect(master);
        o.start(t);o.stop(t+dur+0.1);o2.start(t);o2.stop(t+dur*0.5+0.1);
      }
      function r(){if(dead)return;for(var i=0;i<3;i++)bell(seq[(si+i)%seq.length],i*0.18,2.2);si=(si+3)%seq.length;tid=setTimeout(r,1200);}
      r();return function(){dead=true;clearTimeout(tid);setTimeout(function(){try{master.disconnect();}catch(e){}},300);};
    },
    'Digital Beep':function(){
      var ctx=ac(),master=ctx.createGain();master.gain.value=0.75;master.connect(ctx.destination);
      var dead=false,tid;
      function r(){if(dead)return;
        [0,0.18,0.36].forEach(function(delay){
          var o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=1480;
          var t=ctx.currentTime+delay;

  function normalizeAlarmTime(a){
    if(!a)return;
    var h=Number(a.hour),m=Number(a.minute);
    if(!isFinite(h))h=parseInt(String(a.hour).replace(/\D/g,''),10);
    if(!isFinite(m))m=parseInt(String(a.minute).replace(/\D/g,''),10);
    if(!isFinite(h)||isNaN(h)||h<1||h>12)h=7;
    if(!isFinite(m)||isNaN(m)||m<0||m>59)m=0;
    a.hour=Math.round(h);a.minute=Math.round(m);
    a.period=(String(a.period).toUpperCase()==='PM')?'PM':'AM';
  }
  function ensureDaysArray(a){
    if(!a)return;

    if(!innerEl)return 60;

  function positionAlarmWheels(){

    wheelScrollLock=true;
    hwi.classList.add('wheel-syncing');
    mwi.classList.add('wheel-syncing');
    var stepH=getWheelItemStep(hwi),stepM=getWheelItemStep(mwi);
    var hs=(h-1)*stepH,ms=m*stepM;
    hwi.scrollTop=hs;
    mwi.scrollTop=ms;
    requestAnimationFrame(function(){
      hwi.scrollTop=hs;
      mwi.scrollTop=ms;
    });
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        hwi.scrollTop=hs;
        mwi.scrollTop=ms;
        hwi.classList.remove('wheel-syncing');
        mwi.classList.remove('wheel-syncing');
      });
    });
    var hw=$active('#hw'),mw=$active('#mw');
    if(hw)updateWheelColors(hw,'h');

    S.editAlarm.hour=Math.max(1,Math.min(12,isFinite(hh)?hh:7));
    if(isNaN(S.editAlarm.hour))S.editAlarm.hour=7;
    S.editAlarm.minute=Math.max(0,Math.min(59,isFinite(mm)?mm:0));
    if(isNaN(S.editAlarm.minute))S.editAlarm.minute=0;
    S.editAlarm.period=p==='PM'?'PM':'AM';
    normalizeAlarmTime(S.editAlarm);

  /* ADD/EDIT ALARM */

    ensureDaysArray(a);
    var hH='<div class="wheel-pad"></div>';
    for(var i=1;i<=12;i++)hH+='<div class="w-item'+(i===a.hour?' active':'')+'" data-h="'+i+'">'+pad(i)+'</div>';
    hH+='<div class="wheel-pad"></div>';
    var mH='<div class="wheel-pad"></div>';
    for(var j=0;j<60;j++)mH+='<div class="w-item'+(j===a.minute?' active':'')+'" data-m="'+j+'">'+pad(j)+'</div>';
    mH+='<div class="wheel-pad"></div>';
    var dH='<div style="display:flex;gap:var(--gap);">';
    for(var d=0;d<7;d++)dH+='<button class="day-btn '+(a.days[d]?'on':'off')+'" onclick="alarmDayToggle('+d+')">'+DN[d]+'</button>';

    return '<div style="display:flex;flex-direction:column;flex:1;min-height:0;width:100%;height:100%">'
      +'<header class="page-hdr" style="padding-top:40px;flex-shrink:0">'

      +'<span style="font-size:14px;font-weight:500">'+(isEdit?'Edit Alarm':'New Alarm')+'</span>'
      +(isEdit?'<button class="pill-btn" style="color:rgba(255,100,100,.8)" onclick="delAlarm()">'+IC.trash+'</button>':'<div style="width:40px"></div>')
      +'</header>'

      +'<div class="w-wrap" style="margin-bottom:16px">'
      +'<div style="display:flex;align-items:center">'
      +'<div style="flex:1"><div class="wheel" id="hw"><div class="wheel-inner" id="hw-inner">'+hH+'</div></div></div>'
      +'<div class="sf" style="font-size:44px;color:rgba(255,255,255,.25);padding:0 4px;flex-shrink:0">:</div>'
      +'<div style="flex:1"><div class="wheel" id="mw"><div class="wheel-inner" id="mw-inner">'+mH+'</div></div></div>'
      +'<div style="width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;flex-shrink:0">'
      +'<button type="button" id="ap-am" onclick="alarmPeriod(\'AM\')" style="font-size:13px;font-weight:700;letter-spacing:.06em;padding:6px 8px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;background:'+(a.period==='AM'?'rgba(255,106,42,.18)':'transparent')+';color:'+(a.period==='AM'?'#fff':'rgba(255,255,255,.22)')+'">AM</button>'
      +'<button type="button" id="ap-pm" onclick="alarmPeriod(\'PM\')" style="font-size:13px;font-weight:700;letter-spacing:.06em;padding:6px 8px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;background:'+(a.period==='PM'?'rgba(255,106,42,.18)':'transparent')+';color:'+(a.period==='PM'?'#fff':'rgba(255,255,255,.22)')+'">PM</button>'
      +'</div></div></div>'
      +'<button onclick="alarmOpenLabel()" style="width:100%;margin-bottom:10px;padding:14px var(--px);display:flex;align-items:center;justify-content:space-between;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--line);cursor:pointer;color:inherit">'
      +'<div style="display:flex;align-items:center;gap:10px"><span style="color:var(--accent);opacity:.7">'+IC.tag+'</span>'
      +'<div style="text-align:left"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px">Label</div>'
      +'<div style="font-size:14px;font-weight:500;color:'+(a.label?'#fff':'var(--muted)')+'">'+esc(a.label||'Add a label…')+'</div></div></div>'
      +'<span style="color:var(--muted);opacity:.4">'+IC.chevR+'</span></button>'

      +'<span style="color:var(--accent);flex-shrink:0">'+IC.vol+'</span><span style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(formatSoundLabel(a.sound))+'</span></button>'
      +'<button onclick="alarmOpenSound()" style="padding:13px 14px;display:flex;align-items:center;gap:6px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid var(--line);cursor:pointer;color:inherit;flex-shrink:0">'
      +'<span style="color:var(--muted)">'+IC.music+'</span><span style="font-size:12px;color:var(--muted)">Browse</span></button></div>'

      +'<button onclick="stopPreview();goBackToAlarm()" style="font-size:14px;font-weight:600;padding:0 8px;background:none;border:none;color:var(--accent);cursor:pointer">Done</button></header>'

  /* SCHEDULE */
  function htmlSchedule(){
    var a=S.editAlarm,st=a?a.scheduleType:'weekly';
    var selectedDays=a&&Array.isArray(a.days)&&a.days.length?a.days.slice():[true,true,true,true,true,false,false];
    while(selectedDays.length<7)selectedDays.push(false);
    selectedDays=selectedDays.slice(0,7);
    var types=[
      {v:'weekly',l:'Weekly',d:'Repeat on selected days each week'},
      {v:'once',l:'One-time',d:'Rings once, then disables'},
      {v:'biweekly',l:'Bi-weekly',d:'Every other week on selected days'},
      {v:'lastday',l:'Last Day',d:'Last day of each month'},
    ];
    var typeRows=types.map(function(tp){
      var sel=st===tp.v;
      return '<button data-stype="'+tp.v+'" style="width:100%;padding:14px var(--px);display:flex;align-items:center;justify-content:space-between;border-radius:14px;border:1px solid '+(sel?'rgba(255,106,42,.35)':'var(--line)')+';background:'+(sel?'rgba(255,106,42,.08)':'rgba(255,255,255,.02)')+';cursor:pointer;color:inherit;text-align:left;transition:all .18s;margin-bottom:8px">'
        +'<div><div style="font-size:14px;font-weight:500;color:'+(sel?'var(--accent)':'var(--ink)')+'">'+tp.l+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+tp.d+'</div></div>'
        +(sel?'<span style="color:var(--accent);flex-shrink:0">'+IC.check+'</span>':'')
        +'</button>';
    }).join('');
    var daySection='';
    if(st==='weekly'||st==='biweekly'){
      daySection='<div style="margin-top:8px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;padding-left:2px">'+(st==='biweekly'?'Bi-weekly on':'Repeat on')+'</div>'
        +'<div style="display:flex;gap:var(--gap)">'
        +selectedDays.map(function(on,i){return '<button class="day-btn '+(on?'on':'off')+'" onclick="schedDayToggle('+i+')">'+DN[i]+'</button>';}).join('')
        +'</div></div>';
    }
    return '<header class="page-hdr">'
      +'<button class="pill-btn" onclick="goBackToAlarm()">'+IC.back+'</button>'
      +'<h1 style="font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.72)">Schedule</h1>'
      +'<button onclick="goBackToAlarm()" style="font-size:14px;font-weight:600;padding:0 8px;background:none;border:none;color:var(--accent);cursor:pointer">Done</button></header>'
      +'<div class="scroll-area" style="padding:0 var(--px) 32px">'
      +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;padding-left:2px">Type</div>'
      +typeRows+daySection+'<div class="bottom-spacer"></div></div>';
  }

  /* ── EVENT BINDING ── */
  function bindEvents(name){
    switch(name){
      case 'welcome':
        tap('btn-start',function(){go('permissions');});
        break;
      case 'permissions':
        tap('perm-back',function(){go('welcome');});
        tap('perm-ok',function(){continueFromPermissions();});
        togTap('tog-notif');togTap('tog-wake');break;
      case 'dashboard':
        tap('btn-hist',function(){go('history');});
        tap('btn-cog',function(){go('settings');});
        tap('qb-add',function(){S.editAlarm=mkAlarm();S.prevScreen='dashboard';go('addalarm');});
        tap('qb-schedule',function(){if(!S.editAlarm){S.editAlarm=mkAlarm();S.prevScreen='dashboard';}go('schedule');});
        tap('qb-sound',function(){if(!S.editAlarm){S.editAlarm=mkAlarm();S.prevScreen='dashboard';}go('soundpicker');});
        tap('qb-preview',function(){doPreviewAlarm();});
        $$('[data-tid]').forEach(function(t){
          t.addEventListener('click',function(e){e.stopPropagation();var id=t.dataset.tid;for(var i=0;i<S.alarms.length;i++)if(S.alarms[i].id===id){S.alarms[i].enabled=!S.alarms[i].enabled;t.classList.toggle('on',S.alarms[i].enabled);t.classList.toggle('off',!S.alarms[i].enabled);saveState();androidNotify();break;}});
        });break;
      case 'addalarm':
      case 'editalarm':
        setupWheels();break;
      case 'soundpicker':break;
      case 'schedule':
        $$('[data-stype]').forEach(function(b){
          b.addEventListener('click',function(){if(S.editAlarm){S.editAlarm.scheduleType=b.dataset.stype;rerender('schedule');androidNotifyDebounced();}});
        });break;
      case 'labeleditor':
        tap('lbl-back',function(){commitLabel();goBackToAlarm();});
        tap('lbl-save',function(){commitLabel();goBackToAlarm();});
        tap('lbl-save-btn',function(){commitLabel();goBackToAlarm();});
        var li=$('#lbl-inp');if(li)li.addEventListener('input',function(){var c=$('#lbl-cnt');if(c)c.textContent=li.value.length+'/24';});
        $$('[data-tag]').forEach(function(b){b.addEventListener('click',function(){if(S.editAlarm){S.editAlarm.tag=b.dataset.tag;rerender('labeleditor');}});});
        break;
      case 'settings':
        tap('set-back',function(){go('dashboard');});
        tap('sn-m',function(){S.settings.snoozeDuration=Math.max(1,S.settings.snoozeDuration-1);rerender('settings');saveState();androidNotify();});
        tap('sn-p',function(){S.settings.snoozeDuration=Math.min(10,S.settings.snoozeDuration+1);rerender('settings');saveState();androidNotify();});
        var fr=$('#fade-r');if(fr)fr.addEventListener('input',function(){S.settings.fadeInDuration=parseInt(fr.value,10);var v=$('#fade-v');if(v)v.textContent=fr.value+'s';saveState();androidNotify();});
        $$('[data-vib]').forEach(function(b){b.addEventListener('click',function(){
          S.settings.vibPattern=b.dataset.vib;
          try{if(typeof Android!=='undefined'&&Android.setVibrationPattern)Android.setVibrationPattern(S.settings.vibPattern);}catch(e){}
          rerender('settings');saveState();androidNotify();
        });});
        var tb=$('#tog-bed');if(tb)tb.addEventListener('click',function(){S.settings.bedtime=!S.settings.bedtime;tb.classList.toggle('on');tb.classList.toggle('off');saveState();androidNotify();});
        break;
      case 'history':
        tap('hist-back',function(){go('dashboard');});
        tap('hist-clear',function(){S.history=[];saveState();androidNotify();rerender('history');});break;
      case 'ringing':
        setupSlide();
        tap('btn-snooze',function(){doSnooze();});break;
      case 'snooze':
        tap('sn-back',function(){cancelSnooze();});
        tap('sn-cancel-btn',function(){cancelSnooze();});
        startSnoozeTimer(!!S.snoozeNativeBacked);break;
    }
  }

  /* ── INLINE ONCLICK GLOBALS ── */
  function scrollToSelectedTime(){
    if(!S.editAlarm)return;
    setWheelTime(S.editAlarm.hour,S.editAlarm.minute,S.editAlarm.period);
  }
  function editAlarm(id){
    var alarm=S.alarms.find(function(a){return a.id===id;});
    if(!alarm)return;
    S.editAlarm=JSON.parse(JSON.stringify(alarm));
    normalizeAlarmTime(S.editAlarm);
    ensureDaysArray(S.editAlarm);
    S.prevScreen='dashboard';
    go('editalarm');
  }
  function delAlarm(){
    if(S.editAlarm){S.alarms=S.alarms.filter(function(a){return a.id!==S.editAlarm.id;});S.editAlarm=null;saveState();androidNotify();go('dashboard');}
  }
  function selectSound(name){if(S.editAlarm){S.editAlarm.sound=name;rerender('soundpicker');androidNotifyDebounced();}}
  function togglePreview(name){if(previewName===name){stopPreview();}else{startPreview(name);}}
  function schedDayToggle(i){if(S.editAlarm){ensureDaysArray(S.editAlarm);S.editAlarm.days[i]=!S.editAlarm.days[i];rerender('schedule');androidNotifyDebounced();}}
  function alarmDayToggle(d){if(S.editAlarm){ensureDaysArray(S.editAlarm);S.editAlarm.days[d]=!S.editAlarm.days[d];rerenderAlarm();androidNotifyDebounced();}}
  function alarmPeriod(p){if(S.editAlarm){setWheelTime(S.editAlarm.hour,S.editAlarm.minute,p);androidNotify();}}
  function alarmOpenLabel(){if(S.editAlarm){S.prevScreen=S.screen;go('labeleditor');}}
  function alarmOpenSound(){if(S.editAlarm){S.prevScreen=S.screen;stopPreview();go('soundpicker');}}
  function alarmPreviewSnd(){var snd=S.editAlarm?S.editAlarm.sound:'Soft Bells';if(previewName===snd){stopPreview();}else{startPreview(snd);setTimeout(stopPreview,5000);}}

  /* ── HELPERS ── */
  function tap(id,fn){
    var el=$('#'+id);if(!el)return;
    var n=el.cloneNode(true);el.parentNode.replaceChild(n,el);
    n.addEventListener('click',function(e){e.stopPropagation();fn(e);});
  }
  function togTap(id){
    var el=$('#'+id);if(el)el.addEventListener('click',function(){el.classList.toggle('on');el.classList.toggle('off');});
  }
  function rerender(name){
    var el=APP&&APP.querySelector('#s-'+name);
    if(el){el.innerHTML=wrapScreenHtml(name, html(name));bindEvents(name);}
  }
  function rerenderAlarm(){
    var n=S.screen,el=APP&&APP.querySelector('#s-'+n);
    if(el){
      var sa=el.querySelector('.scroll-area');var scrollY=sa?sa.scrollTop:0;
      el.innerHTML=wrapScreenHtml(n, html(n));bindEvents(n);
      var sa2=el.querySelector('.scroll-area');if(sa2)sa2.scrollTop=scrollY;
    }
  }
  function commitLabel(){
    if(!S.editAlarm)return;
    var li=$('#lbl-inp');if(li)S.editAlarm.label=li.value.trim();
    var ni=$('#note-inp');if(ni)S.editAlarm.note=ni.value.trim();
  }
  function saveAlarm(){
    if(!S.editAlarm)return;
    ensureDaysArray(S.editAlarm);
    var selectedDays=S.editAlarm.days.slice();
    S.editAlarm.days=[...selectedDays];
    var dayOn=0;
    for(var i=0;i<selectedDays.length;i++)if(selectedDays[i])dayOn++;
    var st=S.editAlarm.scheduleType;
    if(st==='weekly'||st==='once'||!st){
      S.editAlarm.scheduleType=dayOn?'weekly':'once';
    }
    normalizeAlarmTime(S.editAlarm);
    var index=S.alarms.findIndex(function(a){return a.id===S.editAlarm.id;});
    if(index!==-1){
      S.alarms[index]={...S.editAlarm};
    }else{
      S.alarms.push({...S.editAlarm,id:Date.now().toString()});
    }
    S.editAlarm=null;
    try{localStorage.setItem('alarms',JSON.stringify(S.alarms));}catch(e){}
    try{saveState();}catch(e){}
    try{
      if(typeof Android!=='undefined'&&Android.onAlarmsChanged){
        Android.onAlarmsChanged(JSON.stringify({alarms:S.alarms,settings:S.settings,history:S.history,onboarded:S.onboarded}));
      }
    }catch(e){}
    go('dashboard');
  }
  function doPreviewAlarm(){
    var al=S.alarms.find(function(a){return a.enabled;})||S.alarms[0];
    if(al){S.ringingAlarmId=al.id;S.snoozeCount=0;startRing();go('ringing');}
    else{S.editAlarm=mkAlarm();S.prevScreen='dashboard';go('addalarm');}
  }

  /* ── WHEELS ── */
  function setupWheels(){
    var hwi=$active('#hw-inner'),mwi=$active('#mw-inner');
    if(!hwi||!mwi||!S.editAlarm)return;
    normalizeAlarmTime(S.editAlarm);
    S.wheelHour=S.editAlarm.hour;
    S.wheelMinute=S.editAlarm.minute;
    S.wheelPeriod=S.editAlarm.period;
    var snapH=null,snapM=null;
    function stepOk(s){return s>=24?s:60;}
    /** Snap + state only after scroll settles — mid-scroll classList/opacity updates caused jitter */
    function snapHourToGrid(){
      if(wheelScrollLock||!hwi||!S.editAlarm)return;
      var step=stepOk(getWheelItemStep(hwi));
      var idx=Math.round(hwi.scrollTop/step);
      idx=Math.max(0,Math.min(11,idx));
      var target=idx*step;
      hwi.scrollTop=target;
      var nh=idx+1;
      if(nh!==S.editAlarm.hour){
        onWheelChange(nh,S.editAlarm.minute,S.editAlarm.period);
      }
      updateWheelColors($active('#hw'),'h');
    }
    function snapMinToGrid(){
      if(wheelScrollLock||!mwi||!S.editAlarm)return;
      var step=stepOk(getWheelItemStep(mwi));
      var idx=Math.round(mwi.scrollTop/step);
      idx=Math.max(0,Math.min(59,idx));
      var target=idx*step;
      mwi.scrollTop=target;
      if(idx!==S.editAlarm.minute){
        onWheelChange(S.editAlarm.hour,idx,S.editAlarm.period);
      }
      updateWheelColors($active('#mw'),'m');
    }
    function onHourScroll(){
      if(wheelScrollLock)return;
      clearTimeout(snapH);
      snapH=setTimeout(snapHourToGrid,200);
    }
    function onMinuteScroll(){
      if(wheelScrollLock)return;
      clearTimeout(snapM);
      snapM=setTimeout(snapMinToGrid,200);
    }
    hwi.onscroll=onHourScroll;
    mwi.onscroll=onMinuteScroll;
    function touchSnapHour(){
      if(wheelScrollLock)return;
      clearTimeout(snapH);
      snapH=setTimeout(snapHourToGrid,40);
    }
    function touchSnapMin(){
      if(wheelScrollLock)return;
      clearTimeout(snapM);
      snapM=setTimeout(snapMinToGrid,40);
    }
    hwi.addEventListener('touchend',touchSnapHour,{passive:true});
    hwi.addEventListener('touchcancel',touchSnapHour,{passive:true});
    mwi.addEventListener('touchend',touchSnapMin,{passive:true});
    mwi.addEventListener('touchcancel',touchSnapMin,{passive:true});
    scheduleAlarmWheelSync();
  }
  function updateWheelColors(wheel,type){
    if(!S.editAlarm||!wheel)return;
    var cur=type==='h'?S.editAlarm.hour:S.editAlarm.minute;
    wheel.querySelectorAll('.w-item').forEach(function(el){
      var raw=type==='h'?el.dataset.h:el.dataset.m;
      if(raw===undefined)return;
      var val=parseInt(raw,10);
      if(isNaN(val))return;
      el.classList.toggle('active',val===cur);
    });
  }

  /* ── SLIDE DISMISS ── */
  function setupSlide(){
    var handle=$('#slide-handle'),track=$('#slide-track'),txt=$('#slide-txt');
    if(!handle||!track)return;
    handle.style.left='6px';
    var drag=false,sx=0;
    function mx(){return track.offsetWidth-handle.offsetWidth-12;}
    function start(x){drag=true;sx=x;handle.style.transition='none';}
    function move(x){if(!drag)return;var d=Math.max(0,Math.min(x-sx,mx()));handle.style.left=(6+d)+'px';if(txt)txt.style.opacity=String(1-d/mx());}
    function end(){if(!drag)return;drag=false;var pos=parseFloat(handle.style.left||'6')-6;if(pos>=mx()*.8){setTimeout(function(){stopRing();dismissAlarm();},200);}else{handle.style.transition='left .4s ease';handle.style.left='6px';if(txt)txt.style.opacity='1';}}
    handle.addEventListener('touchstart',function(e){e.preventDefault();start(e.touches[0].clientX);},{passive:false});
    document.addEventListener('touchmove',function(e){if(drag){e.preventDefault();move(e.touches[0].clientX);}},{passive:false});
    document.addEventListener('touchend',function(){if(drag)end();});
    handle.addEventListener('mousedown',function(e){start(e.clientX);});
    document.addEventListener('mousemove',function(e){move(e.clientX);});
    document.addEventListener('mouseup',function(){if(drag)end();});
  }

  /* ── DASHBOARD CLOCK — update time without full rerender (colon blink runs separately) ── */
  var dashboardClockInterval=null;
  function updateDashboardClock(){
    if(S.screen!=='dashboard')return;
    var t=nowH12();
    var dh=document.getElementById('dash-h'),dm=document.getElementById('dash-m');
    if(dh)dh.textContent=pad(t.h);
    if(dm)dm.textContent=pad(t.m);
    var am=document.getElementById('d-am'),pm=document.getElementById('d-pm');
    if(am&&pm){
      am.style.background=t.p==='AM'?'linear-gradient(135deg,rgba(255,140,90,.4),rgba(255,106,42,.55))':'transparent';
      am.style.color=t.p==='AM'?'#fff':'var(--ink)';
      pm.style.background=t.p==='PM'?'linear-gradient(135deg,rgba(255,140,90,.4),rgba(255,106,42,.55))':'transparent';
      pm.style.color=t.p==='PM'?'#fff':'var(--ink)';
    }
    var nb=document.getElementById('nxt-badge');
    if(nb){
      var na=S.alarms.find(function(a){return a.enabled;});
      nb.textContent=na?('Next: '+fmt(na.hour,na.minute)+' '+na.period):'No active alarms';
    }
  }
  function startDashboardClockTimer(){
    if(dashboardClockInterval)clearInterval(dashboardClockInterval);
    dashboardClockInterval=setInterval(function(){
      if(S.screen==='dashboard')updateDashboardClock();
    },1000);
    document.removeEventListener('visibilitychange',onVisClock);
    document.addEventListener('visibilitychange',onVisClock);
  }
  function onVisClock(){
    if(document.visibilityState==='visible'&&S.screen==='dashboard')updateDashboardClock();
  }

  /* ── ALARM CHECKER ── */
  var lastMinuteEpoch=-1;
  function startChecker(){
    setInterval(function(){
      var now=new Date();
      checkBedtime();
      var minuteEpoch=Math.floor(now.getTime()/60000);
      if(minuteEpoch===lastMinuteEpoch)return;
      lastMinuteEpoch=minuteEpoch;
      var t=nowH12();
      var h12=t.h,m=t.m,p=t.p;
      /* day index: Mon=0 … Sun=6 */
      var di=now.getDay()===0?6:now.getDay()-1;
      if(!(typeof Android!=='undefined'&&Android.onAlarmsChanged)){
        S.alarms.forEach(function(a){
          if(!a.enabled||S.ringingAlarmId===a.id)return;
          var match=a.scheduleType==='once'?true:a.days[di];
          if(match&&a.hour===h12&&a.minute===m&&a.period===p){
            if(a.scheduleType==='once')a.enabled=false;
            S.ringingAlarmId=a.id;S.snoozeCount=0;
            unlockAudio();
            startRing();go('ringing');
          }
        });
      }
    },1000);
  }

  /* ── NOTIFICATIONS / CONFIGURATION ── */
  function hydrateNotificationPermission(){
    try{
      if(typeof Android!=='undefined'&&Android.hasPostNotificationPermission&&Android.hasPostNotificationPermission()){
        S.permissions.notifications=true;
        return;
      }
    }catch(e){}
    if('Notification' in window&&Notification.permission==='granted'){
      S.permissions.notifications=true;
    }
  }
  function showPermError(msg){
    var el=document.getElementById('perm-err');
    if(el&&msg){el.textContent=msg;el.style.display='block';}
  }
  function hidePermError(){
    var el=document.getElementById('perm-err');
    if(el)el.style.display='none';
  }
  function completeOnboardingToDashboard(){
    S.onboarded=true;
    S.settings.permissionsGranted=true;
    S.permissions.notifications=true;
    saveState();
    try{if(typeof Android!=='undefined'&&Android.markPermissionFlowCompleted)Android.markPermissionFlowCompleted();}catch(e){}
    hidePermError();
    androidNotify();
    go('dashboard');
  }
  function continueFromPermissions(){
    hydrateNotificationPermission();
    hidePermError();
    if(S.permissions.notifications){
      completeOnboardingToDashboard();
      return;
    }
    try{
      if(typeof Android!=='undefined'&&Android.requestPostNotificationsPermission){
        Android.requestPostNotificationsPermission();
        return;
      }
    }catch(e){}
    if('Notification' in window){
      if(Notification.permission==='granted'){
        S.permissions.notifications=true;
        completeOnboardingToDashboard();
        return;
      }
      if(Notification.permission==='denied'){
        onPermissionDenied();
        return;
      }
      Notification.requestPermission().then(function(p){
        if(p==='granted'){
          S.permissions.notifications=true;
          completeOnboardingToDashboard();
        }else{
          onPermissionDenied();
        }
      });
      return;
    }
    completeOnboardingToDashboard();
  }
  function onPermissionGranted(){
    completeOnboardingToDashboard();
  }
  function onPermissionDenied(){
    S.permissions.notifications=false;
    saveState();
    hidePermError();
  }
  function notify(title,body){
    if('Notification' in window&&Notification.permission==='granted'){
      try{new Notification(title,{body:body});}catch(e){}
    }
  }

  /* ── ROUTINE / BEDTIME REMINDER ── */
  var bedtimeNotified=false,lastBedtimeDate='';
  function checkBedtime(){
    if(!S.settings.bedtime)return;
    var na=S.alarms.find(function(a){return a.enabled;});if(!na)return;
    var ah=na.hour;
    if(na.period==='PM'&&ah!==12)ah+=12;else if(na.period==='AM'&&ah===12)ah=0;
    var bedH=ah-8;if(bedH<0)bedH+=24;
    var now=new Date(),nh=now.getHours(),nm=now.getMinutes(),today=now.toDateString();
    if(today!==lastBedtimeDate){bedtimeNotified=false;lastBedtimeDate=today;}
    if(!bedtimeNotified&&nh===bedH&&nm===0){
      bedtimeNotified=true;
      notify('🌙 Bedtime Reminder','Time to wind down — alarm set for '+fmt(na.hour,na.minute)+' '+na.period);
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
  }

  /* ── RING ── */
  var vibInt=null;
  function doVibPattern(vib){
    if(!navigator.vibrate)return;
    if(vib==='Pulse')navigator.vibrate([600,300,600,300]);
    else if(vib==='Ripple')navigator.vibrate([150,80,150,80,150,80,600,300]);
    else if(vib==='Storm')navigator.vibrate([400,80,400,80,800,60,800,60,1000,200]);
    else if(vib==='Silent'){/* no vibration */}
    else navigator.vibrate([500,300,500,300]);
  }
  function startRing(){
    /* Critical: resume AudioContext — Android WebView suspends it */
    if(ACX&&ACX.state==='suspended'){ACX.resume();}
    ringPaused=false;
    var a=S.ringingAlarmId?S.alarms.find(function(x){return x.id===S.ringingAlarmId;}):null;
    var snd=a?a.sound:'Soft Bells';
    if(snd&&(String(snd).indexOf('blob:')===0||String(snd).indexOf('http')===0))snd='Soft Bells';
    var synth=SYNTHS[snd]||SYNTHS['Soft Bells'];
    try{ringStop=synth();}catch(e){console.error('ring error',e);}
    clearVib();
    var vib=S.settings.vibPattern;
    if(navigator.vibrate&&vib!=='Silent'){
      doVibPattern(vib);
      vibInt=setInterval(function(){doVibPattern(vib);},2500);
    }
    notify('⏰ Vibe Alarm',a?(a.label||'Alarm')+' '+fmt(a.hour,a.minute)+' '+a.period:'Wake up!');
  }
  function stopRing(){if(ringStop){ringStop();ringStop=null;}ringPaused=false;clearVib();if(navigator.vibrate)navigator.vibrate(0);}
  function clearVib(){if(vibInt){clearInterval(vibInt);vibInt=null;}}
  function dismissAlarm(){
    stopNativeIfAny();
    if(S.ringingAlarmId){
      var a=S.alarms.find(function(x){return x.id===S.ringingAlarmId;});
      if(a){var now=new Date();S.history.unshift({id:uid(),label:a.label||'Alarm',time:fmt(a.hour,a.minute)+' '+a.period,date:now.toLocaleDateString('en-US',{month:'short',day:'numeric'}),status:'dismissed',detail:'Dismissed on time',snoozeCount:S.snoozeCount});}
    }
    S.snoozeCount=0;S.ringingAlarmId=null;go('dashboard');
  }

  /* ── SNOOZE ── */
  var snzInt=null;
  function doSnooze(){
    stopNativeIfAny();stopRing();S.snoozeCount++;
    if(typeof Android!=='undefined'&&Android.scheduleSnooze){
      try{Android.scheduleSnooze(S.ringingAlarmId);}catch(e){}
      S.snoozeNativeBacked=true;
    }else{
      S.snoozeNativeBacked=false;
    }
    go('snooze');
  }
  function startSnoozeTimer(nativeBacked){
    if(snzInt)clearInterval(snzInt);
    var total=S.settings.snoozeDuration*60,left=total,circ=2*Math.PI*108;
    snzInt=setInterval(function(){
      left--;
      var d=$('#sn-disp'),arc=$('#sn-arc');
      if(d)d.textContent=pad(Math.floor(left/60))+':'+pad(left%60);
      if(arc)arc.setAttribute('stroke-dashoffset',String(circ*(1-left/total)));
      if(left<=0){
        clearInterval(snzInt);snzInt=null;
        if(nativeBacked){return;}
        unlockAudio();startRing();go('ringing');
      }
    },1000);
  }
  function cancelSnooze(){
    if(snzInt){clearInterval(snzInt);snzInt=null;}
    try{if(typeof Android!=='undefined'&&Android.cancelSnoozeAlarm)Android.cancelSnoozeAlarm();}catch(e){}
    if(S.ringingAlarmId){var a=S.alarms.find(function(x){return x.id===S.ringingAlarmId;});if(a){var now=new Date();S.history.unshift({id:uid(),label:a.label||'Alarm',time:fmt(a.hour,a.minute)+' '+a.period,date:now.toLocaleDateString('en-US',{month:'short',day:'numeric'}),status:'snoozed',detail:'Cancelled snooze',snoozeCount:S.snoozeCount});}}
    S.snoozeCount=0;S.ringingAlarmId=null;go('dashboard');
  }

  /* ── INIT ── */
  APP=$('#app');
  buildShell();
  hydrateNotificationPermission();
  var start='welcome';
  if(!S.onboarded){start='welcome';}
  else{
    var showPerm=true;
    try{
      if(typeof Android!=='undefined'&&Android.shouldShowPermissionOnboarding)showPerm=Android.shouldShowPermissionOnboarding();
    }catch(e){showPerm=false;}
    start=showPerm?'permissions':'dashboard';
  }
  S.screen=start;
  render(start);
  startChecker();
  androidNotify();
</script>
</body>
